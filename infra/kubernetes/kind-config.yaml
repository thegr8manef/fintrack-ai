# =============================================================================
# FinTrack AI — Kind Cluster Configuration
# =============================================================================
# Local development cluster with 1 control-plane + 2 worker nodes.
# Port mappings expose the NGINX Ingress Controller externally.
# =============================================================================

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: fintrack
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP → NGINX Ingress
      - containerPort: 80
        hostPort: 8090
        protocol: TCP
      # HTTPS → NGINX Ingress
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
  - role: worker
  - role: worker
