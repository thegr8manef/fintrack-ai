# =============================================================================
# FinTrack AI — Redis StatefulSet (Kubernetes Base Manifest)
# =============================================================================
# In-memory cache and message broker for session management,
# rate-limiting, and real-time pub/sub across services.
# =============================================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: fintrack
  labels:
    app: redis
    tier: data
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        tier: data
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            [
              "redis-server",
              "--appendonly",
              "yes",
              "--maxmemory",
              "256mb",
              "--maxmemory-policy",
              "allkeys-lru",
            ]
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: fintrack
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  type: ClusterIP
