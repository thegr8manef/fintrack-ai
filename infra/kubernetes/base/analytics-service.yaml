# =============================================================================
# FinTrack AI — Analytics Service (Kubernetes Base Manifest)
# =============================================================================
# Spend analytics and report generation.
# Connects to PostgreSQL (fintrack_analytics), Elasticsearch, and Kafka.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: fintrack
  labels:
    app: analytics-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
        tier: backend
    spec:
      containers:
        - name: analytics-service
          image: fintrack/analytics-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3004
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3004"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fintrack-secrets
                  key: analytics-database-url
            - name: ELASTICSEARCH_URL
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: elasticsearch-url
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: kafka-brokers
          resources:
            requests:
              memory: "192Mi"
              cpu: "150m"
            limits:
              memory: "384Mi"
              cpu: "750m"
          livenessProbe:
            tcpSocket:
              port: 3004
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: fintrack
  labels:
    app: analytics-service
spec:
  selector:
    app: analytics-service
  ports:
    - port: 3004
      targetPort: 3004
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service-hpa
  namespace: fintrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
