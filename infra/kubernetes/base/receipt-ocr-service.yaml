# =============================================================================
# FinTrack AI — Receipt OCR Service (Kubernetes Base Manifest)
# =============================================================================
# Receipt image upload and OCR text extraction.
# Connects to MongoDB (fintrack_receipts) and Kafka.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: receipt-ocr-service
  namespace: fintrack
  labels:
    app: receipt-ocr-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: receipt-ocr-service
  template:
    metadata:
      labels:
        app: receipt-ocr-service
        tier: backend
    spec:
      containers:
        - name: receipt-ocr-service
          image: fintrack/receipt-ocr-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3007
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3007"
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: fintrack-secrets
                  key: mongodb-url
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: kafka-brokers
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            tcpSocket:
              port: 3007
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: receipt-ocr-service
  namespace: fintrack
  labels:
    app: receipt-ocr-service
spec:
  selector:
    app: receipt-ocr-service
  ports:
    - port: 3007
      targetPort: 3007
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: receipt-ocr-service-hpa
  namespace: fintrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: receipt-ocr-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
