# =============================================================================
# FinTrack AI — Kubernetes Base Manifests (API Gateway)
# =============================================================================
#
# Defines the Kubernetes resources for the API Gateway:
#
# 1. Namespace: 'fintrack' — Isolates all FinTrack resources
# 2. Deployment: 2 replicas, 128Mi-256Mi memory, 100m-500m CPU
#    - Liveness probe:  GET /api/v1/health (15s initial, 10s period)
#    - Readiness probe: GET /api/v1/health (5s initial, 5s period)
# 3. Service: LoadBalancer exposing port 80 → container 3000
# 4. HPA: Auto-scales 2–10 replicas at 70% CPU utilization
#
# Applied via Kustomize: kubectl apply -k infra/kubernetes/overlays/dev/
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: fintrack
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: fintrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: fintrack/api-gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: fintrack
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: fintrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
