# =============================================================================
# FinTrack AI — API Gateway (Kubernetes Base Manifest)
# =============================================================================
# Entry point for all client requests. Proxies to internal microservices.
# Deployment: 2 replicas, 128Mi-256Mi memory, 100m-500m CPU
# Service: ClusterIP on port 3000 (exposed externally via Ingress)
# HPA: Auto-scales 2–10 replicas at 70% CPU utilization
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: fintrack
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: fintrack/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: auth-service-url
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: user-service-url
            - name: TRANSACTION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: transaction-service-url
            - name: ANALYTICS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: analytics-service-url
            - name: AI_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: ai-service-url
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: notification-service-url
            - name: RECEIPT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: receipt-ocr-service-url
            - name: CURRENCY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: currency-service-url
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: fintrack
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: fintrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
