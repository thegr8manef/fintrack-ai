# =============================================================================
# FinTrack AI — Kustomize Base Configuration
#
# Base layer for Kubernetes manifests. Overlays (dev/staging/prod)
# patch this base with environment-specific values (replica counts,
# resource limits, image tags, etc.).
#
# Usage: kubectl apply -k infra/kubernetes/overlays/<env>/
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - api-gateway.yaml

namespace: fintrack

commonLabels:
  project: fintrack
