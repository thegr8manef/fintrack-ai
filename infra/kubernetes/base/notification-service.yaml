# =============================================================================
# FinTrack AI — Notification Service (Kubernetes Base Manifest)
# =============================================================================
# Multi-channel notification queue (push, email, SMS).
# Connects to PostgreSQL (fintrack_notifications) and Kafka.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: fintrack
  labels:
    app: notification-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        tier: backend
    spec:
      containers:
        - name: notification-service
          image: fintrack/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3006
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3006"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fintrack-secrets
                  key: notifications-database-url
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: kafka-brokers
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 3006
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3006
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: fintrack
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: 3006
      targetPort: 3006
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: fintrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
