# =============================================================================
# FinTrack AI — User Service (Kubernetes Base Manifest)
# =============================================================================
# User profile and preferences management.
# Connects to PostgreSQL (fintrack_users) and Kafka.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: fintrack
  labels:
    app: user-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        tier: backend
    spec:
      containers:
        - name: user-service
          image: fintrack/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3002"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fintrack-secrets
                  key: users-database-url
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: kafka-brokers
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: fintrack
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 3002
      targetPort: 3002
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: fintrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
