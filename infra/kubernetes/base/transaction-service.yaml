# =============================================================================
# FinTrack AI — Transaction Service (Kubernetes Base Manifest)
# =============================================================================
# Financial transactions, accounts, and budgets management.
# Connects to PostgreSQL (fintrack_transactions) and Kafka.
# Higher resource limits due to complex queries and Kafka integration.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: fintrack
  labels:
    app: transaction-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
        tier: backend
    spec:
      containers:
        - name: transaction-service
          image: fintrack/transaction-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3003"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fintrack-secrets
                  key: transactions-database-url
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: kafka-brokers
          resources:
            requests:
              memory: "192Mi"
              cpu: "150m"
            limits:
              memory: "384Mi"
              cpu: "750m"
          livenessProbe:
            tcpSocket:
              port: 3003
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: fintrack
  labels:
    app: transaction-service
spec:
  selector:
    app: transaction-service
  ports:
    - port: 3003
      targetPort: 3003
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: transaction-service-hpa
  namespace: fintrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: transaction-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
