# =============================================================================
# FinTrack AI — Currency Service (Kubernetes Base Manifest)
# =============================================================================
# FX rates fetching, caching, and conversion logic.
# Connects to PostgreSQL (fintrack_currency), Redis, and Kafka.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: currency-service
  namespace: fintrack
  labels:
    app: currency-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: currency-service
  template:
    metadata:
      labels:
        app: currency-service
        tier: backend
    spec:
      containers:
        - name: currency-service
          image: fintrack/currency-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3008
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3008"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fintrack-secrets
                  key: currency-database-url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: redis-url
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: kafka-brokers
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 3008
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3008
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: currency-service
  namespace: fintrack
  labels:
    app: currency-service
spec:
  selector:
    app: currency-service
  ports:
    - port: 3008
      targetPort: 3008
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: currency-service-hpa
  namespace: fintrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: currency-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
