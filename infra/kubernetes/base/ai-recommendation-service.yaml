# =============================================================================
# FinTrack AI — AI Recommendation Service (Kubernetes Base Manifest)
# =============================================================================
# AI-powered transaction categorization and spending insights.
# Connects to Redis and Kafka. Stateless, CPU-intensive for AI inference.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-recommendation-service
  namespace: fintrack
  labels:
    app: ai-recommendation-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-recommendation-service
  template:
    metadata:
      labels:
        app: ai-recommendation-service
        tier: backend
    spec:
      containers:
        - name: ai-recommendation-service
          image: fintrack/ai-recommendation-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3005
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3005"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: redis-url
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: fintrack-config
                  key: kafka-brokers
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            tcpSocket:
              port: 3005
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-recommendation-service
  namespace: fintrack
  labels:
    app: ai-recommendation-service
spec:
  selector:
    app: ai-recommendation-service
  ports:
    - port: 3005
      targetPort: 3005
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-recommendation-service-hpa
  namespace: fintrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-recommendation-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
