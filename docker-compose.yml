# =============================================================================
# FinTrack AI — Docker Compose (Development Environment)
# =============================================================================
#
# Spins up the entire FinTrack AI platform locally:
#
# Infrastructure:
#   - PostgreSQL 16:    Primary database for auth, users, transactions, analytics,
#                       notifications, and currency services (port 5432)
#   - MongoDB 7:        Document store for receipt OCR service (port 27017)
#   - Redis 7:          Cache layer for currency rates, sessions, rate limiting (port 6379)
#   - Zookeeper:        Kafka coordination (port 2181)
#   - Kafka 7.6:        Event streaming for async service communication (port 9092)
#   - Elasticsearch 8:  Search and analytics engine for spend aggregation (port 9200)
#
# Microservices (9 services + 1 gateway):
#   - api-gateway (3000):            Single entry point, rate limiting, request routing
#   - auth-service (3001):           JWT authentication, registration, token refresh
#   - user-service (3002):           User profiles and preferences
#   - transaction-service (3003):    Financial transactions and budgets
#   - analytics-service (3004):      Spend analytics via Elasticsearch
#   - ai-recommendation-service (3005): AI categorization and insights
#   - notification-service (3006):   Multi-channel notification queue
#   - receipt-ocr-service (3007):    Receipt image upload and OCR
#   - currency-service (3008):       FX rates and currency conversion
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose down           # Stop all services
#   docker-compose down -v        # Stop + delete volumes (reset databases)
#
# Database UIs:
#   pgAdmin:          http://localhost:5050  (admin@fintrack.ai / admin)
#   Mongo Express:    http://localhost:8083
#   Redis Commander:  http://localhost:8082
#
# =============================================================================

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack_dev
      POSTGRES_DB: fintrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  # --- Database UI Tools ---
  pgadmin:
    image: dpage/pgadmin4:latest
    depends_on:
      - postgres
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fintrack.ai
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json

  mongo-express:
    image: mongo-express:1.0
    depends_on:
      - mongodb
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_BASICAUTH: "false"

  redis-commander:
    image: rediscommander/redis-commander:latest
    depends_on:
      - redis
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379

  # --- Services ---
  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - redis
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - TRANSACTION_SERVICE_URL=http://transaction-service:3003
      - ANALYTICS_SERVICE_URL=http://analytics-service:3004
      - AI_SERVICE_URL=http://ai-recommendation-service:3005
      - NOTIFICATION_SERVICE_URL=http://notification-service:3006
      - RECEIPT_SERVICE_URL=http://receipt-ocr-service:3007
      - CURRENCY_SERVICE_URL=http://currency-service:3008

  auth-service:
    build: ./backend/services/auth-service
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://fintrack:fintrack_dev@postgres:5432/fintrack_auth
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092

  user-service:
    build: ./backend/services/user-service
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - kafka
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATABASE_URL=postgresql://fintrack:fintrack_dev@postgres:5432/fintrack_users
      - KAFKA_BROKERS=kafka:9092

  transaction-service:
    build: ./backend/services/transaction-service
    ports:
      - "3003:3003"
    depends_on:
      - postgres
      - kafka
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DATABASE_URL=postgresql://fintrack:fintrack_dev@postgres:5432/fintrack_transactions
      - KAFKA_BROKERS=kafka:9092

  analytics-service:
    build: ./backend/services/analytics-service
    ports:
      - "3004:3004"
    depends_on:
      - postgres
      - elasticsearch
      - kafka
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DATABASE_URL=postgresql://fintrack:fintrack_dev@postgres:5432/fintrack_analytics
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - KAFKA_BROKERS=kafka:9092

  ai-recommendation-service:
    build: ./backend/services/ai-recommendation-service
    ports:
      - "3005:3005"
    depends_on:
      - kafka
      - redis
    environment:
      - NODE_ENV=development
      - PORT=3005
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092

  notification-service:
    build: ./backend/services/notification-service
    ports:
      - "3006:3006"
    depends_on:
      - postgres
      - kafka
    environment:
      - NODE_ENV=development
      - PORT=3006
      - DATABASE_URL=postgresql://fintrack:fintrack_dev@postgres:5432/fintrack_notifications
      - KAFKA_BROKERS=kafka:9092

  receipt-ocr-service:
    build: ./backend/services/receipt-ocr-service
    ports:
      - "3007:3007"
    depends_on:
      - mongodb
      - kafka
    environment:
      - NODE_ENV=development
      - PORT=3007
      - MONGODB_URL=mongodb://mongodb:27017/fintrack_receipts
      - KAFKA_BROKERS=kafka:9092

  currency-service:
    build: ./backend/services/currency-service
    ports:
      - "3008:3008"
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - NODE_ENV=development
      - PORT=3008
      - DATABASE_URL=postgresql://fintrack:fintrack_dev@postgres:5432/fintrack_currency
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092

volumes:
  pgdata:
  mongodata:
  esdata:
  pgadmin_data:
